<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Shirasu TRPG Dice</title>

<style>

body{
font-family:sans-serif;
background:#0f172a;
color:white;
padding:20px;
}

h2{margin-top:0;}

input{
padding:8px;
width:300px;
}

button{
padding:8px;
margin-left:5px;
}

#history{
background:#1e293b;
padding:10px;
border-radius:8px;
margin-top:15px;
max-height:340px;
overflow:auto;
}

.msg{
background:#334155;
margin:4px 0;
padding:6px;
border-radius:4px;
}

.normal{color:#38bdf8;font-weight:bold;}
.crit{color:#facc15;font-weight:bold;}
.fumble{color:#ef4444;font-weight:bold;}

</style>
</head>

<body>

<h2>рҹҺІ Shirasu TRPG Dice</h2>

<input id="input" placeholder="дҫӢ: CCB<=60 ж”»ж’ғ">
<button onclick="run()">жҢҜгӮӢ</button>
<button onclick="clearHistory()">еұҘжӯҙеүҠйҷӨ</button>

<div id="history"></div>

<script>

const input=document.getElementById("input")
const historyDiv=document.getElementById("history")

input.addEventListener("keypress",e=>{
if(e.key==="Enter") run()
})

function saveHistory(text){

let list=JSON.parse(localStorage.getItem("diceHistory")||"[]")

list.unshift(text)

if(list.length>100) list.pop()

localStorage.setItem("diceHistory",JSON.stringify(list))

}

function loadHistory(){

let list=JSON.parse(localStorage.getItem("diceHistory")||"[]")

historyDiv.innerHTML=""

list.forEach(t=>{
let d=document.createElement("div")
d.className="msg"
d.innerHTML=t
historyDiv.appendChild(d)
})

}

function clearHistory(){

localStorage.removeItem("diceHistory")
loadHistory()

}

function run(){

let full=input.value.trim()
if(!full) return

let text=full.split(" ")[0]

let result=""
let color="normal"

/* RESB */

if(text.toUpperCase().startsWith("RESB(")){

let m=text.match(/RESB\((\d+)-(\d+)\)/i)

if(m){

let x=parseInt(m[1])
let y=parseInt(m[2])

let diff=x-y
let target=50+diff*5

if(target<1) target=1
if(target>100) target=100

let roll=Math.floor(Math.random()*100)+1

if(roll===1) color="crit"
if(roll===100) color="fumble"

let success=roll<=target?"жҲҗеҠҹ":"еӨұж•—"

result=`(1D100<=${target}) пјһ ${roll} пјһ ${success}`

}

}

/* CCB */

else if(text.toUpperCase().startsWith("CCB")){

let m=text.match(/CCB(\((\d+)\))?(<=\d+)?/i)

let fumbleNum=null
let target=null

if(m[2]) fumbleNum=parseInt(m[2])
if(m[3]) target=parseInt(m[3].replace("<=",""))

let roll=Math.floor(Math.random()*100)+1

let success=target && roll<=target?"жҲҗеҠҹ":"еӨұж•—"

if(roll===1) color="crit"
if(roll===100) color="fumble"

if(fumbleNum && roll>=fumbleNum){

color="fumble"

result=`(1D100<=${target}) пјһ ${roll} пјһ ${success} пјһ ж•…йҡң`

}else{

result=`(1D100<=${target}) пјһ ${roll} пјһ ${success}`

}

}

/* CC */

else if(text.toUpperCase().startsWith("CC")){

let roll=Math.floor(Math.random()*100)+1

if(roll===1){

color="crit"

result=`(1D100) пјһ ${roll} пјһ гӮҜгғӘгғҶгӮЈгӮ«гғ«`

}

else if(roll===100){

color="fumble"

result=`(1D100) пјһ ${roll} пјһ гғ•гӮЎгғігғ–гғ«`

}

else{

result=`(1D100) пјһ ${roll}`

}

}

/* BгғҖгӮӨгӮ№ */

else if(/^\d+B\d+/i.test(text)){

let m=text.match(/(\d+)B(\d+)(<=\d+)?/i)

let n=parseInt(m[1])
let max=parseInt(m[2])

let target=null
if(m[3]) target=parseInt(m[3].replace("<=",""))

let rolls=[]
let success=0

for(let i=0;i<n;i++){

let r=Math.floor(Math.random()*max)+1

rolls.push(r)

if(target && r<=target) success++

}

if(target){

result=`(${n}B${max}<=${target}) пјһ [${rolls.join(",")}] пјһ жҲҗеҠҹж•°${success}`

}else{

result=`(${n}B${max}) пјһ [${rolls.join(",")}]`

}

}

/* NdM */

else if(/^\d+d\d+/i.test(text)){

let p=text.toLowerCase().split("d")

let n=parseInt(p[0])
let m=parseInt(p[1])

let rolls=[]
let total=0

for(let i=0;i<n;i++){

let r=Math.floor(Math.random()*m)+1

rolls.push(r)
total+=r

}

result=`(${n}D${m}) пјһ [${rolls.join(",")}] пјһ еҗҲиЁҲ${total}`

}

/* choice */

else if(text.startsWith("choice[")){

let options=text.slice(7,-1).split(",")

if(options.length>1000){

result="choiceдёҠйҷҗ1000"

}else{

let r=options[Math.floor(Math.random()*options.length)]

result=`choice пјһ ${r}`

}

}

let log=`${full} вҶ’ <span class="${color}">${result}</span>`

let div=document.createElement("div")

div.className="msg"

div.innerHTML=log

historyDiv.prepend(div)

saveHistory(log)

input.value=""

}

loadHistory()

</script>

</body>
</html>
<script>

const input=document.getElementById("input")
const historyDiv=document.getElementById("history")

/* EnterгҒ§жҢҜгӮӢ */

input.addEventListener("keypress",e=>{
if(e.key==="Enter") run()
})

/* еұҘжӯҙдҝқеӯҳ */

function saveHistory(text){

let list=JSON.parse(localStorage.getItem("diceHistory")||"[]")

list.unshift(text)

if(list.length>100) list.pop()

localStorage.setItem("diceHistory",JSON.stringify(list))

}

/* еұҘжӯҙиӘӯгҒҝиҫјгҒҝ */

function loadHistory(){

let list=JSON.parse(localStorage.getItem("diceHistory")||"[]")

historyDiv.innerHTML=""

list.forEach(t=>{
let d=document.createElement("div")
d.className="msg"
d.innerHTML=t
historyDiv.appendChild(d)
})

}

function clearHistory(){

localStorage.removeItem("diceHistory")
loadHistory()

}

/* гғЎгӮӨгғіеҮҰзҗҶ */

function run(){

let full=input.value.trim()
if(!full) return

let text=full.split(" ")[0]

let result=""
let color="normal"

/* RESB */

if(text.toUpperCase().startsWith("RESB(")){

let m=text.match(/RESB\((\d+)-(\d+)\)/i)

if(m){

let x=parseInt(m[1])
let y=parseInt(m[2])

let diff=x-y
let target=50+diff*5

if(target<1) target=1
if(target>100) target=100

let roll=Math.floor(Math.random()*100)+1

if(roll===1) color="crit"
else if(roll===100) color="fumble"

let success=roll<=target?"жҲҗеҠҹ":"еӨұж•—"

result=`[${roll}] зӣ®жЁҷ${target} ${success}`

}

}

/* CCB */

else if(text.toUpperCase().startsWith("CCB")){

let m=text.match(/CCB(<=\d+)?/i)

let target=null

if(m && m[1]) target=parseInt(m[1].replace("<=",""))

let roll=Math.floor(Math.random()*100)+1

if(roll===1) color="crit"
else if(roll===100) color="fumble"

if(target){

let success=roll<=target?"жҲҗеҠҹ":"еӨұж•—"

result=`[${roll}] ${success}`

}else{

result=`[${roll}]`

}

}

/* CC */

else if(text.toUpperCase().startsWith("CC")){

let roll=Math.floor(Math.random()*100)+1

if(roll===1){
color="crit"
result=`[${roll}] гӮҜгғӘгғҶгӮЈгӮ«гғ«`
}
else if(roll===100){
color="fumble"
result=`[${roll}] гғ•гӮЎгғігғ–гғ«`
}
else{
result=`[${roll}]`
}

}

/* NdM */

else if(/^\d+d\d+/i.test(text)){

let p=text.toLowerCase().split("d")

let n=parseInt(p[0])
let m=parseInt(p[1])

let rolls=[]
let total=0

for(let i=0;i<n;i++){

let r=Math.floor(Math.random()*m)+1

rolls.push(r)
total+=r

}

result=`[${rolls.join(",")}] еҗҲиЁҲ${total}`

}

/* choice */

else if(text.startsWith("choice[")){

let options=text.slice(7,-1).split(",")

if(options.length>1000){
result="choiceдёҠйҷҗ1000"
}else{

let r=options[Math.floor(Math.random()*options.length)]

result=r

}

}

/* иЎЁзӨә */

let log=`${full} вҶ’ <span class="${color}">${result}</span>`

let div=document.createElement("div")

div.className="msg"

div.innerHTML=log

historyDiv.prepend(div)

saveHistory(log)

input.value=""

}

/* иө·еӢ• */

loadHistory()

</script>

</body>
</html>
