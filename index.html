<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>TRPG Dice</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="theme-dark">

<h1>TRPG Dice</h1>

<div class="themeButtons">
<button onclick="setTheme('theme-light')">白</button>
<button onclick="setTheme('theme-dark')">黒</button>
<button onclick="setTheme('theme-midnight')">ミッドナイト</button>
</div>

<div class="diceBox">

<input id="diceInput" placeholder="例: CCB<=60 攻撃">
<button onclick="roll()">振る</button>

</div>

<div id="result"></div>

<script>

function roll(){

let input=document.getElementById("diceInput").value

let main=input.split(" ")[0]

let resultText=""

let color="blue"

let dice=Math.floor(Math.random()*100)+1

// CCB判定

if(main.startsWith("CCB<=")){

let target=parseInt(main.replace("CCB<=",""))

if(dice==1){

resultText="1 → クリティカル"
color="yellow"

}else if(dice>=96){

resultText=dice+" → ファンブル"
color="red"

}else if(dice<=target){

resultText=dice+" → 成功"

}else{

resultText=dice+" → 失敗"

}

}

// RESB

else if(main.startsWith("RESB")){

let nums=main.match(/\((\d+)-(\d+)\)/)

let a=parseInt(nums[1])
let b=parseInt(nums[2])

let target=50+(a-b)*5

let d=Math.floor(Math.random()*100)+1

if(d<=target){

resultText=d+" → 成功"

}else{

resultText=d+" → 失敗"

}

}

// 1B100

else if(main=="1B100"){

let d=Math.floor(Math.random()*100)+1

resultText=d

}

// XdY

else if(main.includes("d")){

let parts=main.split("d")

let count=parseInt(parts[0])
let sides=parseInt(parts[1])

let total=0
let detail=""

for(let i=0;i<count;i++){

let r=Math.floor(Math.random()*sides)+1
total+=r
detail+=r+" "

}

resultText=total+" ("+detail+")"

}

// choice

else if(main.startsWith("choice[")){

let text=main.replace("choice[","").replace("]","")

let arr=text.split(",")

let pick=arr[Math.floor(Math.random()*arr.length)]

resultText=pick

}

document.getElementById("result").innerHTML=
"<div class='diceResult "+color+"'>"+resultText+"</div>"

}

function setTheme(theme){

document.body.className=theme

}

</script>

</body>
</html>
