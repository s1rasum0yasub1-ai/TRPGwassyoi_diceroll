<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Shirasu TRPG Dice</title>

<style>

/* テーマ */

body{
font-family:sans-serif;
transition:0.3s;
}

body.dark{
background:#0f172a;
color:white;
}

body.white{
background:#f4f4f4;
color:black;
}

body.midnight{
background:#020617;
color:#cbd5f5;
}

/* UI */

input,button,select{
padding:6px;
margin:4px;
}

#history{
border-radius:8px;
padding:10px;
max-height:260px;
overflow:auto;
border:1px solid #555;
}

/* ログ */

.msg{
margin:4px 0;
padding:6px;
border-radius:6px;
background:rgba(120,120,120,0.2);
}

/* ダイス結果色 */

.normal{color:#38bdf8;font-weight:bold;}
.crit{color:#facc15;font-weight:bold;}
.fumble{color:#ef4444;font-weight:bold;}

/* ログ再生 */

#logViewer{
border:1px solid #666;
padding:10px;
height:200px;
overflow:auto;
margin-top:10px;
}

.chatLine{
margin:3px 0;
font-weight:bold;
text-shadow:
-1px -1px 0 #000,
1px -1px 0 #000,
-1px 1px 0 #000,
1px 1px 0 #000;
}

</style>
</head>

<body class="dark">

<h2>🎲 Shirasu TRPG Dice</h2>

テーマ
<select onchange="setTheme(this.value)">
<option value="dark">黒</option>
<option value="white">白</option>
<option value="midnight">ミッドナイト</option>
</select>

<br>

<input id="input" placeholder="CCB<=60 攻撃">
<button onclick="run()">振る</button>
<button onclick="clearHistory()">履歴削除</button>
<button onclick="saveLog()">ログ保存</button>

<div id="history"></div>

<hr>

<h3>⚔ RESB</h3>

自分 <input id="resbA" type="number" value="10">
相手 <input id="resbB" type="number" value="10">

<button onclick="runRESB()">RESB</button>

<hr>

<h3>📜 セッションログ再生</h3>

<textarea id="logInput" rows="5" cols="50" placeholder="ログを貼り付け"></textarea>

<br>

<button onclick="playLog()">再生</button>

<div id="logViewer"></div>

<script>

/* テーマ */

function setTheme(t){

document.body.className=t

}

/* Enter */

input.addEventListener("keypress",e=>{
if(e.key==="Enter") run()
})

const historyDiv=document.getElementById("history")

/* 履歴 */

function saveHistory(text){

let list=JSON.parse(localStorage.getItem("diceHistory")||"[]")

list.unshift(text)

if(list.length>100) list.pop()

localStorage.setItem("diceHistory",JSON.stringify(list))

}

function loadHistory(){

let list=JSON.parse(localStorage.getItem("diceHistory")||"[]")

historyDiv.innerHTML=""

list.forEach(t=>{

let d=document.createElement("div")

d.className="msg"

d.innerHTML=t

historyDiv.appendChild(d)

})

}

function clearHistory(){

localStorage.removeItem("diceHistory")

loadHistory()

}

/* コピー */

function copyText(t){

navigator.clipboard.writeText(t)

}

/* ログ保存 */

function saveLog(){

let list=JSON.parse(localStorage.getItem("diceHistory")||"[]")

let blob=new Blob([list.join("\n")],{type:"text/plain"})

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="dice_log.txt"

a.click()

}

/* ダイス */

function run(){

let full=input.value.trim()

if(!full) return

let text=full.split(" ")[0]

let result=""
let color="normal"

/* RESB */

if(text.toUpperCase().startsWith("RESB(")){

let m=text.match(/RESB\((\d+)-(\d+)\)/i)

if(m){

let x=parseInt(m[1])
let y=parseInt(m[2])

let target=50+(x-y)*5

let roll=Math.floor(Math.random()*100)+1

let success=roll<=target?"成功":"失敗"

result=`(1D100<=${target}) ＞ ${roll} ＞ ${success}`

}

}

/* CCB */

else if(text.toUpperCase().startsWith("CCB")){

let m=text.match(/CCB(\((\d+)\))?(<=\d+)?/i)

let fumble=null
let target=null

if(m[2]) fumble=parseInt(m[2])
if(m[3]) target=parseInt(m[3].replace("<=",""))

let roll=Math.floor(Math.random()*100)+1

let success=target && roll<=target?"成功":"失敗"

if(roll===1) color="crit"
if(roll===100) color="fumble"

if(fumble && roll>=fumble){

color="fumble"

result=`(1D100<=${target}) ＞ ${roll} ＞ ${success} ＞ 故障`

}else{

result=`(1D100<=${target}) ＞ ${roll} ＞ ${success}`

}

}

/* NdM */

else if(/^\d+d\d+/i.test(text)){

let p=text.toLowerCase().split("d")

let n=parseInt(p[0])
let m=parseInt(p[1])

let rolls=[]
let total=0

for(let i=0;i<n;i++){

let r=Math.floor(Math.random()*m)+1

rolls.push(r)
total+=r

}

result=`(${n}D${m}) ＞ [${rolls.join(",")}] ＞ 合計${total}`

}

/* choice */

else if(text.startsWith("choice[")){

let list=text.slice(7,-1).split(",")

let r=list[Math.floor(Math.random()*list.length)]

result=`choice ＞ ${r}`

}

/* 表示 */

let log=`${full} → <span class="${color}" onclick="copyText('${result}')">${result}</span>`

let div=document.createElement("div")

div.className="msg"

div.innerHTML=log

historyDiv.prepend(div)

saveHistory(log)

input.value=""

}

/* RESB UI */

function runRESB(){

let a=parseInt(resbA.value)

let b=parseInt(resbB.value)

let target=50+(a-b)*5

let roll=Math.floor(Math.random()*100)+1

let success=roll<=target?"成功":"失敗"

let log=`RESB(${a}-${b}) → (1D100<=${target}) ＞ ${roll} ＞ ${success}`

let div=document.createElement("div")

div.className="msg"

div.innerHTML=log

historyDiv.prepend(div)

saveHistory(log)

}

list.forEach(t=>{

let full=input.value.trim()
if(!full) return

let text=full.split(" ")[0]

let result=""
let color="normal"

if(m){

let y=parseInt(m[2])

/* CCB */

else if(text.toUpperCase().startsWith("CCB")){

if(m[2]) fumbleNum=parseInt(m[2])
if(m[3]) target=parseInt(m[3].replace("<=",""))

total+=r

}

</script>
