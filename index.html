<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Shirasu TRPG Dice</title>

<style>

body{
font-family:sans-serif;
background:#0f172a;
color:white;
padding:20px;
}

h2{
margin-top:0;
}

input{
padding:8px;
width:260px;
}

button{
padding:8px;
margin-left:5px;
}

#history{
background:#1e293b;
padding:10px;
border-radius:8px;
margin-top:15px;
max-height:300px;
overflow:auto;
}

.msg{
background:#334155;
margin:4px 0;
padding:6px;
border-radius:4px;
}

.normal{color:#38bdf8;font-weight:bold;}
.crit{color:#facc15;font-weight:bold;}
.fumble{color:#ef4444;font-weight:bold;}

</style>
</head>

<body>

<h2>🎲 Shirasu TRPG Dice</h2>

<input id="input" placeholder="例: CCB / 1d100 / RESB(11-10)">
<button onclick="run()">振る</button>
<button onclick="clearHistory()">履歴削除</button>

<div id="history"></div>

<script>

const input=document.getElementById("input")
const historyDiv=document.getElementById("history")

/* Enterで振る */

input.addEventListener("keypress",e=>{
if(e.key==="Enter") run()
})

/* 履歴保存 */

function saveHistory(text){

let list=JSON.parse(localStorage.getItem("diceHistory")||"[]")

list.unshift(text)

if(list.length>100) list.pop()

localStorage.setItem("diceHistory",JSON.stringify(list))

}

/* 履歴読み込み */

function loadHistory(){

let list=JSON.parse(localStorage.getItem("diceHistory")||"[]")

historyDiv.innerHTML=""

list.forEach(t=>{
let d=document.createElement("div")
d.className="msg"
d.innerHTML=t
historyDiv.appendChild(d)
})

}

function clearHistory(){

localStorage.removeItem("diceHistory")
loadHistory()

}

/* メイン処理 */

function run(){

let full=input.value.trim()
if(!full) return

let text=full.split(" ")[0]

let result=""
let color="normal"

/* RESB */

if(text.toUpperCase().startsWith("RESB(")){

let m=text.match(/RESB\((\d+)-(\d+)\)/i)

if(m){

let x=parseInt(m[1])
let y=parseInt(m[2])

let diff=x-y
let target=50+diff*5

if(target<1) target=1
if(target>100) target=100

let roll=Math.floor(Math.random()*100)+1

if(roll===1) color="crit"
else if(roll===100) color="fumble"

let success=roll<=target?"成功":"失敗"

result=`[${roll}] 目標${target} ${success}`

}

}

/* CCB */

else if(text.toUpperCase().startsWith("CCB")){

let m=text.match(/CCB(<=\d+)?/i)

let target=null

if(m && m[1]) target=parseInt(m[1].replace("<=",""))

let roll=Math.floor(Math.random()*100)+1

if(roll===1) color="crit"
else if(roll===100) color="fumble"

if(target){

let success=roll<=target?"成功":"失敗"

result=`[${roll}] ${success}`

}else{

result=`[${roll}]`

}

}

/* CC */

else if(text.toUpperCase().startsWith("CC")){

let roll=Math.floor(Math.random()*100)+1

if(roll===1){
color="crit"
result=`[${roll}] クリティカル`
}
else if(roll===100){
color="fumble"
result=`[${roll}] ファンブル`
}
else{
result=`[${roll}]`
}

}

/* NdM */

else if(/^\d+d\d+/i.test(text)){

let p=text.toLowerCase().split("d")

let n=parseInt(p[0])
let m=parseInt(p[1])

let rolls=[]
let total=0

for(let i=0;i<n;i++){

let r=Math.floor(Math.random()*m)+1

rolls.push(r)
total+=r

}

result=`[${rolls.join(",")}] 合計${total}`

}

/* choice */

else if(text.startsWith("choice[")){

let options=text.slice(7,-1).split(",")

if(options.length>1000){
result="choice上限1000"
}else{

let r=options[Math.floor(Math.random()*options.length)]

result=r

}

}

/* 表示 */

let log=`${full} → <span class="${color}">${result}</span>`

let div=document.createElement("div")

div.className="msg"

div.innerHTML=log

historyDiv.prepend(div)

saveHistory(log)

input.value=""

}

/* 起動 */

loadHistory()

</script>

</body>
</html>
