<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>RESB & TRPG ダイスツール</title>
<style>
body{font-family:sans-serif;background:#0f172a;color:#fff;padding:20px;}
h2,h3{margin-top:0;}
input,button,select{padding:6px;margin:4px;}
#resbDiv,#diceDiv,#history{background:#1e293b;padding:10px;border-radius:8px;margin-top:10px;}
#history{max-height:250px;overflow:auto;}
.msg{margin:4px 0;padding:4px;background:#334155;border-radius:4px;}
label{display:block;margin-top:6px;}
.flex{display:flex;align-items:center;gap:10px;}
</style>
</head>
<body>

<h2>🎲 RESB & TRPG ダイスツール</h2>

<div id="resbDiv">
  <div class="flex">
    <div>
      <label>自分 (x)</label>
      <input id="resbX" type="number">
    </div>
    <div>
      <label>相手 (y)</label>
      <input id="resbY" type="number">
    </div>
    <button onclick="calcRESB()">計算</button>
  </div>
  <div id="resbResult">RESB 結果: -</div>
</div>

<div id="diceDiv">
  <label>ダイス入力 (例: 1d100 / 2B100<=50 / CCB<=50 / CCB(97)<=50 / choice[a,b,c] / 3d6)</label>
  <input id="diceInput">
  <button onclick="rollDice()">振る</button>
</div>

<div id="history"></div>

<script>
const historyDiv = document.getElementById("history");

/* 履歴追加 */
function addHistory(text){
  let div = document.createElement("div");
  div.className = "msg";
  div.textContent = text;
  historyDiv.prepend(div);
}

/* RESB計算 */
function calcRESB(){
  let x = parseFloat(document.getElementById("resbX").value)||0;
  let y = parseFloat(document.getElementById("resbY").value)||0;
  let result = x - y;
  let text = `RESB(${x}-${y}) → ${result}`;
  document.getElementById("resbResult").textContent = text;
  addHistory(text);
}

/* ダイス振り */
function rollDice(){
  let text = document.getElementById("diceInput").value.trim().replace(/\s+/g,"");
  if(!text) return;
  let result = "";

  // choice[a,b,c]
  if(text.toLowerCase().startsWith("choice[")){
    let options = text.slice(7,-1).split(",").map(s=>s.trim());
    result = `choice → ${options[Math.floor(Math.random()*options.length)]}`;
  }
  // Bダイス
  else if(/^\d+B\d+(<=\d+)?$/i.test(text)){
    let m = text.toUpperCase().match(/(\d+)B(\d+)(<=\d+)?/);
    let n = parseInt(m[1]);
    let sides = parseInt(m[2]);
    let target = m[3]?parseInt(m[3].replace("<=","")):null;
    if(n>1000){ result="回数上限1000まで"; }
    else{
      let rolls=[],success=0;
      for(let i=0;i<n;i++){
        let r = Math.floor(Math.random()*sides)+1;
        rolls.push(r);
        if(target!==null && r<=target) success++;
      }
      result = target!==null ? text+" ["+rolls.join(",")+"] 成功数"+success : "["+rolls.join(",")+"]";
    }
  }
  // NdM ダイス
  else if(/^\d+d\d+$/i.test(text)){
    let parts = text.toLowerCase().split("d");
    let n = parseInt(parts[0]);
    let m = parseInt(parts[1]);
    if(n>1000){ result="回数上限1000まで"; }
    else{
      let total=0,rolls=[];
      for(let i=0;i<n;i++){
        let r=Math.floor(Math.random()*m)+1;
        rolls.push(r);
        total+=r;
      }
      result = rolls.length>1 ? rolls.join(",")+" → 合計:"+total : total;
    }
  }
  // CCB (故障ナンバー対応)
  else if(/^CCB(\(\d+\))?(<=\d+)?$/i.test(text)){
    let m = text.toUpperCase().match(/^CCB(\((\d+)\))?(<=\d+)?$/i);
    let failNum = m[2]?parseInt(m[2]):null;
    let target = m[3]?parseInt(m[3].replace("<=","")):null;
    let roll = Math.floor(Math.random()*100)+1;
    let success = (target!==null && roll<=target)?1:0;
    let fail = (failNum!==null && roll>=failNum)?true:false;
    result = `${text} → 出目:${roll} ${success?"成功":""} ${fail?"故障":""}`;
  }
  // CC (クリティカル/ファンブル)
  else if(/^CC(<=\d+)?$/i.test(text)){
    let m = text.toUpperCase().match(/^CC(<=\d+)?$/i);
    let target = m[1]?parseInt(m[1].replace("<=","")):null;
    let roll = Math.floor(Math.random()*100)+1;
    let succ = (target!==null && roll<=target)?1:0;
    let crit = roll===1?"クリティカル":"";
    let fumble = roll===100?"ファンブル":"";
    result = target!==null ? `${text} → 出目:${roll} 成功数${succ} ${crit}${fumble}` : `${text} → 出目:${roll} ${crit}${fumble}`;
  }
  else{
    result="未対応コマンド";
  }

  addHistory(result);
  document.getElementById("diceInput").value="";
}

/* 初期化 */
</script>

</body>
</html>
