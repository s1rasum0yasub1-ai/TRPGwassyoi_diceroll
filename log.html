<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Session Log</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="theme-dark">

<h1>ログビューア</h1>

<textarea id="logInput" rows="12" style="width:90%" placeholder="ログ貼り付け"></textarea>

<br><br>

<button onclick="parse()">表示</button>

<div id="logView"></div>

<script>

function parse(){

let text=document.getElementById("logInput").value

let lines=text.split("\n")

let html=""

lines.forEach(l=>{

let p=l.split(":")

if(p.length>=2){

let name=p[0]

let msg=p.slice(1).join(":")

html+="<div><span class='char'>"+name+"</span>: "+msg+"</div>"

}else{

html+="<div>"+l+"</div>"

}

})

document.getElementById("logView").innerHTML=html

}

</script>

</body>
</html>
