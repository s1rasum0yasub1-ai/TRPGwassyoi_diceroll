<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Session Log</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="theme-dark">

<h1>セッションログ</h1>

<textarea id="logInput" rows="10" style="width:80%" placeholder="ログ貼り付け"></textarea>

<br><br>

<button onclick="parseLog()">表示</button>

<div id="logView"></div>

<script>

function parseLog(){

let text=document.getElementById("logInput").value

let lines=text.split("\n")

let html=""

lines.forEach(line=>{

let parts=line.split(":")

if(parts.length>=2){

let name=parts[0]
let msg=parts.slice(1).join(":")

let color=randomColor()

html+="<div class='logLine'><span class='name' style='color:"+color+"'>"+name+"</span>: "+msg+"</div>"

}else{

html+="<div>"+line+"</div>"

}

})

document.getElementById("logView").innerHTML=html

}

function randomColor(){

let colors=[
"#ff8a8a",
"#8affc1",
"#8ab4ff",
"#ffd480",
"#d28aff"
]

return colors[Math.floor(Math.random()*colors.length)]

}

</script>

</body>
</html>
